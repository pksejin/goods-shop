<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — 잔재미코딩 굿즈샵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f3f4f6; min-height: 100vh; }
    header { background: #1f2937; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 17px; font-weight: 700; color: #fff; text-decoration: none; }
    .header-right { display: flex; align-items: center; gap: 16px; font-size: 14px; color: #d1d5db; }
    .btn-out { padding: 6px 14px; border: 1px solid #4b5563; background: transparent; color: #d1d5db; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-out:hover { background: #374151; }

    main { max-width: 1000px; margin: 32px auto; padding: 0 16px; }
    .section { margin-bottom: 40px; }
    h2 { font-size: 17px; font-weight: 700; color: #1f2937; margin-bottom: 14px; }

    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); font-size: 14px; }
    th { background: #f9fafb; padding: 12px 16px; text-align: left; font-weight: 600; color: #374151; border-bottom: 1px solid #e5e7eb; }
    td { padding: 12px 16px; color: #374151; border-bottom: 1px solid #f3f4f6; }
    tr:last-child td { border-bottom: none; }
    .mono { font-family: monospace; font-size: 12px; color: #6b7280; }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .paid { background: #dcfce7; color: #16a34a; }
    .pending { background: #fef9c3; color: #b45309; }
    .failed { background: #fee2e2; color: #dc2626; }

    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab { padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: background .15s; }
    .tab.active { background: #1f2937; color: #fff; }
    .tab:not(.active) { background: #fff; color: #6b7280; border: 1px solid #e5e7eb; }
    .tab:not(.active):hover { background: #f3f4f6; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .stat-row { display: flex; gap: 16px; margin-bottom: 28px; }
    .stat-card { background: #fff; border-radius: 10px; padding: 20px 24px; flex: 1; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .stat-label { font-size: 13px; color: #6b7280; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #1f2937; }

    .empty { text-align: center; padding: 32px; color: #9ca3af; font-size: 14px; }
    .access-denied { text-align: center; padding: 80px 16px; color: #ef4444; font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">🛍 잔재미코딩 굿즈샵 — 관리자</a>
    <div class="header-right">
      <span id="admin-email"></span>
      <button class="btn-out" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <main id="main"><p class="empty">확인 중...</p></main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const statusLabel = { paid: '결제완료', pending: '결제대기', failed: '결제실패' };

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
    }

    async function loadOrders() {
      const { data } = await sb.from('orders')
        .select('*, order_items(product_name, quantity, price)')
        .order('created_at', { ascending: false });

      const tbody = document.getElementById('orders-tbody');
      if (!data?.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">주문 없음</td></tr>'; return; }

      // 통계
      const paidOrders = data.filter(o => o.status === 'paid');
      document.getElementById('stat-total').textContent = data.length + '건';
      document.getElementById('stat-revenue').textContent = paidOrders.reduce((s, o) => s + o.total_amount, 0).toLocaleString() + '원';

      tbody.innerHTML = data.map(o => {
        const itemNames = (o.order_items || []).map(i => `${i.product_name} ×${i.quantity}`).join(', ');
        return `<tr>
          <td class="mono">${o.toss_order_id || o.id.substring(0,8)}</td>
          <td class="mono">${o.user_id.substring(0,8)}...</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${itemNames}">${itemNames}</td>
          <td>${o.total_amount.toLocaleString()}원</td>
          <td><span class="badge ${o.status}">${statusLabel[o.status] || o.status}</span></td>
          <td>${new Date(o.created_at).toLocaleString('ko-KR')}</td>
        </tr>`;
      }).join('');
    }

    async function loadMembers() {
      const { data } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
      const tbody = document.getElementById('members-tbody');
      if (!data?.length) { tbody.innerHTML = '<tr><td colspan="3" class="empty">회원 없음</td></tr>'; return; }

      document.getElementById('stat-members').textContent = data.length + '명';

      tbody.innerHTML = data.map(p => `<tr>
        <td class="mono">${p.id.substring(0,8)}...</td>
        <td>${new Date(p.created_at).toLocaleString('ko-KR')}</td>
        <td>${p.is_admin ? '✅ 관리자' : '일반'}</td>
      </tr>`).join('');
    }

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { location.href = 'login.html'; return; }

      const { data: profile } = await sb.from('profiles').select('is_admin').eq('id', user.id).single();
      if (!profile?.is_admin) {
        document.getElementById('main').innerHTML = '<p class="access-denied">관리자 권한이 없습니다.</p>';
        return;
      }

      document.getElementById('admin-email').textContent = user.email;
      document.getElementById('main').innerHTML = `
        <div class="stat-row">
          <div class="stat-card"><p class="stat-label">전체 주문</p><p class="stat-value" id="stat-total">-</p></div>
          <div class="stat-card"><p class="stat-label">총 매출 (결제완료)</p><p class="stat-value" id="stat-revenue">-</p></div>
          <div class="stat-card"><p class="stat-label">전체 회원</p><p class="stat-value" id="stat-members">-</p></div>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="orders" onclick="switchTab('orders')">주문 내역</button>
          <button class="tab" data-tab="members" onclick="switchTab('members')">회원 목록</button>
        </div>
        <div class="tab-panel active" id="panel-orders">
          <h2>주문 내역</h2>
          <table>
            <thead><tr><th>주문번호</th><th>회원ID</th><th>상품</th><th>금액</th><th>상태</th><th>일시</th></tr></thead>
            <tbody id="orders-tbody"><tr><td colspan="6" class="empty">불러오는 중...</td></tr></tbody>
          </table>
        </div>
        <div class="tab-panel" id="panel-members">
          <h2>회원 목록</h2>
          <table>
            <thead><tr><th>회원ID</th><th>가입일</th><th>구분</th></tr></thead>
            <tbody id="members-tbody"><tr><td colspan="3" class="empty">불러오는 중...</td></tr></tbody>
          </table>
        </div>
      `;

      loadOrders();
      loadMembers();
    }

    async function logout() {
      await sb.auth.signOut();
      location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
