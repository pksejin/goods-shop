<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 잔재미코딩 굿즈샵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f3f4f6; display: flex; flex-direction: column; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 56px; display: flex; align-items: center; }
    header a { text-decoration: none; font-size: 18px; font-weight: 700; color: #1f2937; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
    .card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; margin-bottom: 28px; color: #1f2937; }
    label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; margin-bottom: 16px; outline: none; transition: border-color .15s; }
    input:focus { border-color: #3b82f6; }
    .btn { width: 100%; padding: 13px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #2563eb; }
    .msg { margin-top: 12px; font-size: 14px; text-align: center; color: #ef4444; min-height: 20px; }
    .foot { margin-top: 20px; text-align: center; font-size: 14px; color: #6b7280; }
    .foot a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <header><a href="index.html">🛍 잔재미코딩 굿즈샵</a></header>
  <main>
    <div class="card">
      <h1>로그인</h1>
      <label>이메일</label>
      <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password">
      <button class="btn" onclick="login()">로그인</button>
      <p class="msg" id="msg"></p>
      <p class="foot">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      msg.textContent = '';

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { msg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.'; return; }

      const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
      location.href = redirect;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
