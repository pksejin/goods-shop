<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — 잔재미코딩 굿즈샵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f3f4f6; display: flex; flex-direction: column; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 56px; display: flex; align-items: center; }
    header a { text-decoration: none; font-size: 18px; font-weight: 700; color: #1f2937; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
    .card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; margin-bottom: 28px; color: #1f2937; }
    label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; margin-bottom: 16px; outline: none; transition: border-color .15s; }
    input:focus { border-color: #3b82f6; }
    .btn { width: 100%; padding: 13px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #2563eb; }
    .msg { margin-top: 12px; font-size: 14px; text-align: center; min-height: 20px; }
    .msg.error { color: #ef4444; }
    .msg.success { color: #16a34a; }
    .foot { margin-top: 20px; text-align: center; font-size: 14px; color: #6b7280; }
    .foot a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <header><a href="index.html">🛍 잔재미코딩 굿즈샵</a></header>
  <main>
    <div class="card">
      <h1>회원가입</h1>
      <label>이메일</label>
      <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
      <label>비밀번호 <span style="color:#9ca3af;font-size:12px">(6자 이상)</span></label>
      <input type="password" id="password" placeholder="비밀번호" autocomplete="new-password">
      <button class="btn" onclick="signup()">가입하기</button>
      <p class="msg" id="msg"></p>
      <p class="foot">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function signup() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      msg.textContent = '';

      if (password.length < 6) { msg.className = 'msg error'; msg.textContent = '비밀번호는 6자 이상이어야 합니다.'; return; }

      const { error } = await sb.auth.signUp({ email, password });
      if (error) { msg.className = 'msg error'; msg.textContent = error.message; return; }

      msg.className = 'msg success';
      msg.textContent = '가입 완료! 로그인 페이지로 이동합니다...';
      setTimeout(() => location.href = 'login.html', 1500);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') signup(); });
  </script>
</body>
</html>
